openapi: 3.0.3
info:
  title: Order Management API
  version: 1.0.0
  description: |
    Enterprise-grade Order Management API for B2B retail supply chain / enterprise workflow systems.
    
    This API focuses on:
    - Order lifecycle management (Execution Plane)
    - Controlled change management and auditability (Control Plane)
    - Single source of truth via snapshotting (unitPriceSnapshot, taxRateSnapshot)
    - Scalable calculation strategy per ProductCategory
    
    Calculation Rule:
    `totalCost = orderAmount * unitPriceSnapshot * (1 + taxRateSnapshot)`

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Product
    description: Product catalog management
  - name: Order
    description: Order lifecycle and transaction management
  - name: User
    description: User and reference management

paths:
  /api/product/{product_id}:
    get:
      tags: [Product]
      summary: Get Product by Id
      description: |
        Retrieve active product details including current unit price and tax rate.
        This endpoint is part of the Execution Plane for product discovery.
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found or soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/order:
    post:
      tags: [Order]
      summary: Create Order
      description: |
        Initialize a new order aggregate.
        Automatically resolves and locks unitPrice and taxRate snapshots from the master data.
        Initial status is set to DRAFT according to the lifecycle state machine.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully with snapshot data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid request payload or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/order/{order_id}:
    patch:
      tags: [Order]
      summary: Patch Order by order_id
      description: |
        Perform controlled partial updates on an order.
        v1 strictly allows mutation of 'orderAmount' only.
        Updates are subject to state-machine rules (only permitted in DRAFT or SUBMITTED states).
      operationId: patchOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOrderRequest'
      responses:
        '200':
          description: Order updated and totalCost recalculated using snapshots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Business rule violation or invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Order]
      summary: Delete Order by order_id
      description: |
        Soft delete an order record.
        Maintains business history for auditability while removing it from active operations.
      operationId: deleteOrderById
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '204':
          description: Order successfully soft-deleted
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/order/{userId}:
    get:
      tags: [Order]
      summary: Get Order by User
      description: |
        Retrieve a list of active (non-deleted) orders associated with a specific user.
        This endpoint fulfills the core business requirement for user order history.
      operationId: getOrdersByUserId
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: List of user orders (empty list if none found)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/user/{userId}:
    delete:
      tags: [User]
      summary: Delete User
      description: |
        Soft delete a user record.
        In compliance with the assignment, all related order references are also soft-deleted.
      operationId: deleteUserById
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User and related orders successfully soft-deleted
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    Product:
      type: object
      required:
        - id
        - productName
        - unitPrice
      properties:
        id:
          type: integer
          format: int64
        productName:
          type: string
        productCategoryId:
          type: integer
          format: int64
        unitPrice:
          type: number
          format: decimal
          description: Current unit price from catalog
        taxRate:
          type: number
          format: decimal
          description: Resolved tax rate from category (decimal, e.g. 0.05)

    Order:
      type: object
      required:
        - id
        - userId
        - productId
        - orderAmount
        - totalCost
        - status
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        orderAmount:
          type: integer
          format: int32
        unitPriceSnapshot:
          type: number
          format: decimal
          description: Locked price at creation time
        taxRateSnapshot:
          type: number
          format: decimal
          description: Locked tax rate at creation time
        totalCost:
          type: number
          format: decimal
          description: Final calculated cost
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderStatus:
      type: string
      enum: [DRAFT, SUBMITTED, APPROVED, CANCELLED]
      description: |
        Lifecycle states:
        - DRAFT: Initial state, fully editable
        - SUBMITTED: Locked for review, limited editing
        - APPROVED: Finalized, no further changes allowed
        - CANCELLED: Terminal state for aborted orders

    CreateOrderRequest:
      type: object
      required:
        - userId
        - productId
        - orderAmount
      properties:
        userId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        orderAmount:
          type: integer
          format: int32
          minimum: 1

    PatchOrderRequest:
      type: object
      description: Only orderAmount is allowed to be patched in v1.
      properties:
        orderAmount:
          type: integer
          format: int32
          minimum: 1
      additionalProperties: false

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - traceId
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. ERR_RESOURCE_NOT_FOUND)
        message:
          type: string
          description: Human-readable error message
        traceId:
          type: string
          description: Unique request ID for troubleshooting
        details:
          type: array
          items:
            type: string
          description: Optional list of detailed errors (e.g. validation errors)

# Custom Feature Switches
api:
  docs:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    io.github.liuliu.ordermanagement: DEBUG
    org.springdoc: INFO

observability:
  otlp:
    base-url: http://localhost:4318

management:
  tracing:
    sampling:
      probability: 1.0   # dev 全開
